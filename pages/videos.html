<!DOCTYPE html>
<html lang="en">
<head>
 	<meta charset="UTF-8">
 	<meta name="viewport" content="width=device-width, initial-scale=1.0">
 	<title>Videos | KoreaSathi</title>
 	<meta name="description" content="Watch helpful videos, student stories, and guide walkthroughs for international students in South Korea. Get inspired and learn from the community.">

 	<!-- Open Graph / Facebook -->
 	<meta property="og:type" content="website">
 	<meta property="og:url" content="https://koreasathi.com/videos">
 	<meta property="og:title" content="KoreaSathi Videos - Learn and Get Inspired">
 	<meta property="og:description" content="Curated video resources for students in Korea. From immigration tips to personal student vlogs.">
 	<meta property="og:image" content="https://koreasathi.com/assets/images/hero_background.png">

 	<link rel="stylesheet" href="../assets/css/styles.css">
 	<link rel="stylesheet" href="../assets/css/videos.css">
 	<script src="../assets/js/main.js" defer></script>
 	</head>
 	<body class="videos-page">
 	<div data-navbar></div>

 	<main class="videos-main">
 		<section class="videos-hero">
 			<div class="videos-hero-content">
 				<div class="videos-hero-badge">VIDEOS</div>
 				<h1>Watch. Learn.<br><span style="color:#ff5252">Get Inspired.</span></h1>
 				<p>Helpful videos and real stories for Nepali students in Korea. Learn, prepare, and thrive in your journey.</p>
 				<div class="videos-search-wrapper">
 					<input id="videoSearch" type="text" placeholder="Search videos..." aria-label="Search videos" class="videos-search-input">
 					<button class="videos-search-btn">🔍</button>
 				</div>
 			</div>
 		</section>

 		<section class="videos-controls">
 			<div class="controls">
 				<select id="videoSort" aria-label="Sort videos" class="sort-select">
 					<option value="latest">Latest</option>
 					<option value="popular">Popular</option>
 				</select>
 			</div>
 		</section>

 		<section class="video-preview">
 			<div class="video-box">
 			  <iframe width="300" height="200" src="https://www.youtube.com/embed/pSEy4mLbjV4?si=rbHej1p1Tbcbw-zf" title="How to Study in Korea for Free" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen class="embedded-video"></iframe>
 			</div>
 		</section>
 	</main>

 	<div data-footer></div>

 	<script src="../assets/js/videos.js" defer></script>
</body>
</html>
