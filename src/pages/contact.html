<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - KoreaSathi</title>
  <meta name="description" content="Get in touch with KoreaSathi. Send us a message, report an issue, or suggest a new feature.">
  <link rel="canonical" href="https://koreasathi.com/contact">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://koreasathi.com/contact">
  <meta property="og:title" content="Contact - KoreaSathi">
  <meta property="og:description" content="Get in touch with KoreaSathi — send a message, report an issue, or suggest a new guide or feature.">
  <meta property="og:image" content="https://koreasathi.com/assets/images/hero_background.webp">
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="Contact - KoreaSathi">
  <meta property="twitter:description" content="Get in touch with KoreaSathi — send a message, report an issue, or suggest a feature.">
  <meta property="twitter:image" content="https://koreasathi.com/assets/images/hero_background.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css">
  <link rel="stylesheet" href="../css/styles.css">
   <style>
    body { background: #151A28; color: #F1F5F9; font-family: 'Inter', system-ui, sans-serif; margin: 0; overflow-x: hidden; }
    .hero-gradient { background: linear-gradient(180deg, #071A35 0%, #102E5A 50%, #173D6B 100%); }
  </style>
</head>
<body class="antialiased">
  <a href="#main-content" class="skip-link">Skip to content</a>
  <div data-navbar></div>
  <div class="ad-slot ad-slot--top" data-ad-slot="top" aria-hidden="true"></div>

  <section class="relative py-28 sm:py-32 lg:py-36 overflow-hidden" style="background: url('../assets/images/hero_background.webp') center/cover;">
    <div class="absolute inset-0 pointer-events-none">
      <div class="grid-pattern"></div>
      <div class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] rounded-full bg-blue-500/10 blur-[120px]"></div>
      <div class="absolute bottom-[-10%] right-[-5%] w-[35%] h-[35%] rounded-full bg-cyan-400/8 blur-[120px]"></div>
    </div>
    <div class="container-custom relative z-10">
      <div class="max-w-3xl mx-auto text-center" data-aos="fade-up">
        <div class="inline-flex items-center gap-2 rounded-full pl-2 pr-4 py-1.5 mb-5 bg-white/5 backdrop-blur-xl border border-white/10">
          <span class="bg-gradient-to-r from-blue-500 to-blue-600 text-white text-[10px] font-bold px-2.5 py-0.5 rounded-full uppercase tracking-wider">Contact</span>
          <span class="text-white/60 text-xs font-semibold tracking-wide">Get in Touch</span>
        </div>
        <h1 class="text-4xl sm:text-5xl lg:text-6xl font-extrabold text-white tracking-tight mb-4">Contact Us</h1>
        <p class="text-white/50 text-base sm:text-lg max-w-xl mx-auto">Have a question, suggestion, or want to collaborate? We'd love to hear from you.</p>
      </div>
    </div>
  </section>

  <main id="main-content">

    <section class="section-y relative overflow-hidden hero-gradient">
      <div class="grid-pattern"></div>
      <div class="container-custom relative z-10">
        <div class="grid grid-cols-1 lg:grid-cols-5 gap-8 lg:gap-12">

          <div class="lg:col-span-3" data-aos="fade-up">
            <div class="glass-card-strong p-6 sm:p-8 lg:p-10">
              <h2 class="text-xl font-bold text-white mb-6 tracking-tight">Send a message</h2>
              <form id="contactForm" class="space-y-5">
                <div class="form-group">
                  <label for="name" class="form-label">Name *</label>
                  <input type="text" id="name" name="name" required class="form-input" placeholder="Your name">
                </div>
                <div class="form-group">
                  <label for="email" class="form-label">Email *</label>
                  <input type="email" id="email" name="email" required class="form-input" placeholder="you@example.com">
                </div>
                <div class="form-group">
                  <label for="subject" class="form-label">Subject</label>
                  <input type="text" id="subject" name="subject" class="form-input" placeholder="How can we help?">
                </div>
                <div class="form-group">
                  <label for="message" class="form-label">Message *</label>
                  <textarea id="message" name="message" required rows="5" class="form-input resize-none" placeholder="Tell us what's on your mind..."></textarea>
                </div>
                <button type="submit" class="btn-primary w-full sm:w-auto">
                  <i class="fas fa-paper-plane text-xs"></i> Send Message
                </button>
              </form>
            </div>
          </div>

          <div class="lg:col-span-2 space-y-5" data-aos="fade-up" data-aos-delay="100">
            <div class="glass-card p-6">
              <div class="w-11 h-11 rounded-xl bg-primary/10 flex items-center justify-center text-primary text-sm mb-4"><i class="fas fa-envelope"></i></div>
              <h3 class="text-sm font-bold text-white mb-1">Email</h3>
              <a href="mailto:csjibu@gmail.com" class="text-white/60 text-xs hover:text-primary transition-colors">csjibu@gmail.com</a>
            </div>
            <div class="glass-card p-6">
              <div class="w-11 h-11 rounded-xl bg-primary/10 flex items-center justify-center text-primary text-sm mb-4"><i class="fab fa-github"></i></div>
              <h3 class="text-sm font-bold text-white mb-1">GitHub</h3>
              <a href="https://github.com" target="_blank" rel="noopener noreferrer" class="text-white/60 text-xs hover:text-primary transition-colors">Open an issue or contribute</a>
            </div>
            <div class="glass-card p-6">
              <div class="w-11 h-11 rounded-xl bg-primary/10 flex items-center justify-center text-primary text-sm mb-4"><i class="fab fa-discord"></i></div>
              <h3 class="text-sm font-bold text-white mb-1">Discord</h3>
              <a href="#" target="_blank" rel="noopener noreferrer" class="text-white/60 text-xs hover:text-primary transition-colors">Join our community server</a>
            </div>
            <div class="glass-card p-6">
              <div class="flex items-center gap-3">
                <a href="https://www.tiktok.com/@csjibu" target="_blank" rel="noopener noreferrer" class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center text-white/60 hover:text-white hover:bg-white/10 transition-all text-sm">
                  <i class="fab fa-tiktok"></i>
                </a>
                <a href="https://www.youtube.com/@csjibu" target="_blank" rel="noopener noreferrer" class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center text-white/60 hover:text-white hover:bg-white/10 transition-all text-sm">
                  <i class="fab fa-youtube"></i>
                </a>
                <a href="https://github.com" target="_blank" rel="noopener noreferrer" class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center text-white/60 hover:text-white hover:bg-white/10 transition-all text-sm">
                  <i class="fab fa-github"></i>
                </a>
              </div>
            </div>
          </div>

        </div>
      </div>
    </section>

  </main>

  <div data-footer></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>
  <script src="../js/main.js" type="module"></script>
</body>
</html>
