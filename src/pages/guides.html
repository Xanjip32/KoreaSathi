<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guides - KoreaSathi</title>
  <meta name="description" content="Comprehensive student guides for international students in South Korea — work permits, immigration, jobs, housing, and more.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css">
  <link rel="stylesheet" href="../dist/css/styles.css">
   <style>
    body { background: #151A28; color: #F1F5F9; font-family: 'Inter', system-ui, sans-serif; margin: 0; overflow-x: hidden; }
    .hero-gradient { background: linear-gradient(180deg, #071A35 0%, #102E5A 50%, #173D6B 100%); }
  </style>
</head>
<body class="antialiased">
  <a href="#main-content" class="skip-link">Skip to content</a>
  <div data-navbar></div>

  <!-- HERO -->
  <section class="relative py-28 sm:py-32 lg:py-36 overflow-hidden" style="background: linear-gradient(180deg, #071A35 0%, #102E5A 50%, #173D6B 100%);">
    <div class="absolute inset-0 pointer-events-none">
      <div class="absolute inset-0" style="background: url('../assets/images/guides_bg.png') center/cover; opacity: 0.5;"></div>
      <div class="absolute inset-0" style="background: rgba(7,26,53,0.45);"></div>
      <div class="grid-pattern"></div>
      <div class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] rounded-full bg-blue-500/15 blur-[120px]"></div>
      <div class="absolute bottom-[-10%] right-[-5%] w-[35%] h-[35%] rounded-full bg-purple-500/12 blur-[120px]"></div>
    </div>
    <div class="container-custom relative z-10">
      <div class="max-w-3xl mx-auto text-center" data-aos="fade-up">
        <div class="inline-flex items-center gap-2 rounded-full pl-2 pr-4 py-1.5 mb-5 bg-white/10 backdrop-blur-xl border border-white/15">
          <span class="bg-gradient-to-r from-blue-500 to-blue-600 text-white text-[10px] font-bold px-2.5 py-0.5 rounded-full uppercase tracking-wider">Free</span>
          <span class="text-white/70 text-xs font-semibold tracking-wide">Downloadable PDFs</span>
        </div>
        <h1 class="text-4xl sm:text-5xl lg:text-6xl font-extrabold text-white tracking-tight mb-4">Student Guides &amp; Resources</h1>
        <p class="text-white/60 text-base sm:text-lg max-w-xl mx-auto mb-8">Everything you need to know about living, working, and studying in Korea — all in one place.</p>
        <div class="search-bar">
          <i class="fas fa-search search-bar-icon"></i>
          <input type="text" class="search-bar-input" placeholder="Search guides by keyword..." id="guidesSearch" oninput="filterGuides()">
        </div>
      </div>
    </div>
  </section>

  <main id="main-content">

    <section class="section-y relative overflow-hidden">
      <div class="grid-pattern"></div>
      <div class="container-custom relative z-10">
        <div class="text-center mb-10" data-aos="fade-up">
          <p class="text-blue-400 text-xs font-bold uppercase tracking-[0.15em] mb-2">All Guides</p>
          <h2 class="section-title">Browse our library</h2>
          <p class="section-subtitle mt-3 mx-auto">Download PDF guides covering every aspect of student life in Korea.</p>
        </div>
        <div class="filter-pills mb-10" id="categoryFilters" data-aos="fade-up" data-aos-delay="50">
          <button class="filter-pill active" data-category="all" onclick="filterByCategory('all', this)">All</button>
          <button class="filter-pill" data-category="work" onclick="filterByCategory('work', this)">Work Permit</button>
          <button class="filter-pill" data-category="visa" onclick="filterByCategory('visa', this)">Visa &amp; Immigration</button>
          <button class="filter-pill" data-category="job" onclick="filterByCategory('job', this)">Part-time Jobs</button>
          <button class="filter-pill" data-category="housing" onclick="filterByCategory('housing', this)">Housing</button>
          <button class="filter-pill" data-category="banking" onclick="filterByCategory('banking', this)">Banking</button>
          <button class="filter-pill" data-category="emergency" onclick="filterByCategory('emergency', this)">Emergency</button>
        </div>
        <div id="guidesContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5" data-aos="fade-up" data-aos-delay="100"></div>
      </div>
    </section>

  </main>

  <div data-footer></div>
  <script>
    window.allGuidePosts = window.allGuidePosts || [];
    let currentCategory = 'all';
    let currentQuery = '';

    function filterByCategory(cat, btn) {
      currentCategory = cat;
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      applyFilters();
    }

    function filterGuides() {
      currentQuery = document.getElementById('guidesSearch').value.toLowerCase().trim();
      applyFilters();
    }

    function applyFilters() {
      const container = document.getElementById('guidesContainer');
      const posts = window.allGuidePosts || [];
      if (!container || !posts.length) return;
      let filtered = posts;
      if (currentCategory !== 'all') {
        filtered = filtered.filter(p => {
          const cats = p.categories ? Object.values(p.categories).map(c => c.name.toLowerCase()) : [];
          return cats.some(c => c.includes(currentCategory));
        });
      }
      if (currentQuery) {
        filtered = filtered.filter(p => {
          const title = (p.title || '').toLowerCase();
          const content = (p.content || '').toLowerCase();
          return title.includes(currentQuery) || content.includes(currentQuery);
        });
      }
      renderGuides(filtered);
    }

    function renderGuides(posts) {
      const container = document.getElementById('guidesContainer');
      if (!posts.length) {
        container.innerHTML = '<p class="text-white/30 text-center col-span-full py-10 text-sm">No guides match your criteria.</p>';
        return;
      }
      container.innerHTML = posts.map(post => {
        const title = post.title || '';
        const desc = post.desc || '';
        const pdfUrl = post.pdfUrl || '';
        const url = post.url || '';
        const date = post.date || '';
        const catNames = post.categories ? Object.values(post.categories).map(c => c.name || c).join(', ') : '';
        const guideLink = 'guide.html#id=' + encodeURIComponent(post.id);
        return `
          <article class="group glass-card p-6 flex flex-col">
            <div class="flex items-center justify-between mb-4">
              ${pdfUrl ? '<span class="badge-new"><i class="fas fa-file-pdf text-[10px]"></i> PDF</span>' : '<span class="badge-new"><i class="fas fa-book-open text-[10px]"></i> Guide</span>'}
              <span class="text-xs text-white/40 font-medium">${date}</span>
            </div>
            <div class="w-11 h-11 rounded-xl bg-blue-500/10 flex items-center justify-center text-blue-400 text-sm mb-4 group-hover:scale-110 transition-transform">
              <i class="fas fa-file-alt"></i>
            </div>
            <h3 class="text-sm font-bold text-white mb-2 line-clamp-2 leading-snug group-hover:text-blue-400 transition-colors">${title}</h3>
            ${catNames ? `<span class="text-[10px] text-white/40 font-medium mb-2">${catNames}</span>` : ''}
            <p class="text-white/50 text-xs leading-relaxed mb-5 line-clamp-3 flex-1">${desc}</p>
            <div class="flex gap-2 mt-auto">
              <a href="${guideLink}" class="flex-1 text-center btn-primary btn-sm">Read Guide</a>
              ${pdfUrl ? `<button class="flex-1 text-center btn-outline btn-sm" onclick="window.downloadPdf('${pdfUrl}', '${title.replace(/'/g, "\\'")}')">Download</button>` : ''}
              ${url ? `<a href="${url}" target="_blank" rel="noopener" class="flex-1 text-center btn-ghost btn-sm" title="View on WordPress"><i class="fas fa-external-link-alt"></i></a>` : ''}
            </div>
          </article>
        `;
      }).join('');
    }
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>
  <script src="../dist/js/main.js" type="module"></script>
</body>
</html>
