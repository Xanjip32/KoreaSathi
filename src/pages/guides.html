<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Guides & Resources for South Korea - KoreaSathi</title>
  <meta name="description" content="Comprehensive student guides for international students in South Korea — work permits, immigration, jobs, housing, banking, and emergency resources. Download free PDFs.">
  <link rel="canonical" href="https://koreasathi.com/guides">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://koreasathi.com/guides">
  <meta property="og:title" content="Student Guides & Resources for South Korea - KoreaSathi">
  <meta property="og:description" content="Step-by-step guides for international students in South Korea: work permits, immigration, part-time jobs, housing, and more.">
  <meta property="og:image" content="https://koreasathi.com/assets/images/guides_bg.webp">
  <meta property="og:locale" content="en_US">
  <meta property="og:site_name" content="KoreaSathi">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Student Guides & Resources for South Korea - KoreaSathi">
  <meta name="twitter:description" content="Step-by-step guides for international students in South Korea: work permits, immigration, jobs, and more.">
  <meta name="twitter:image" content="https://koreasathi.com/assets/images/guides_bg.webp">
  <meta name="twitter:site" content="@csjibu">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'" crossorigin="anonymous" referrerpolicy="no-referrer">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>
  <link rel="stylesheet" href="../css/styles.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://koreasathi.com/" },
      { "@type": "ListItem", "position": 2, "name": "Guides", "item": "https://koreasathi.com/guides" }
    ]
  }
  </script>
  <noscript><style>.skeleton{display:none!important}</style></noscript>
</head>
<body class="antialiased">
  <a href="#main-content" class="skip-link">Skip to content</a>
  <div data-navbar></div>
  <div class="ad-slot ad-slot--top" data-ad-slot="top" aria-hidden="true"></div>

  <!-- HERO -->
  <section class="relative py-28 sm:py-32 lg:py-36 overflow-hidden hero-gradient">
    <div class="absolute inset-0 pointer-events-none">
      <div class="absolute inset-0" style="background: url('../assets/images/guides_bg.webp') center/cover; opacity: 0.5;"></div>
      <div class="absolute inset-0" style="background: rgba(7,26,53,0.45);"></div>
      <div class="grid-pattern"></div>
      <div class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] rounded-full bg-blue-500/15 blur-[120px]"></div>
      <div class="absolute bottom-[-10%] right-[-5%] w-[35%] h-[35%] rounded-full bg-purple-500/12 blur-[120px]"></div>
    </div>
    <div class="container-custom relative z-10">
      <div class="max-w-3xl mx-auto text-center" data-aos="fade-up">
        <div class="inline-flex items-center gap-2 rounded-full pl-2 pr-4 py-1.5 mb-5 bg-white/10 backdrop-blur-xl border border-white/15">
          <span class="bg-gradient-to-r from-blue-500 to-blue-600 text-white text-[10px] font-bold px-2.5 py-0.5 rounded-full uppercase tracking-wider">Free</span>
          <span class="text-white/70 text-xs font-semibold tracking-wide">Downloadable PDFs</span>
        </div>
        <h1 class="hero-title mb-4">Student Guides &amp; Resources</h1>
        <p class="text-white/60 text-base sm:text-lg max-w-xl mx-auto mb-8">Everything you need to know about living, working, and studying in Korea — all in one place.</p>
        <div class="search-bar">
          <i class="fas fa-search search-bar-icon" aria-hidden="true"></i>
          <label for="guidesSearch" class="sr-only">Search guides by keyword</label>
          <input type="search" class="search-bar-input" placeholder="Search guides by keyword..." id="guidesSearch" oninput="filterGuides()">
        </div>
      </div>
    </div>
  </section>

  <main id="main-content" tabindex="-1">

    <section class="section-y relative overflow-hidden">
      <div class="grid-pattern"></div>
      <div class="container-custom relative z-10">
        <div class="text-center mb-10" data-aos="fade-up">
          <p class="text-blue-300 text-xs font-bold uppercase tracking-[0.15em] mb-2">All Guides</p>
          <h2 class="section-title">Browse our library</h2>
          <p class="section-subtitle mt-3 mx-auto">Download PDF guides covering every aspect of student life in Korea.</p>
        </div>
        <div class="filter-pills mb-10" id="categoryFilters" role="group" aria-label="Filter guides by category" data-aos="fade-up" data-aos-delay="50">
          <button class="filter-pill active" data-category="all" aria-pressed="true" onclick="filterByCategory('all', this)">All</button>
          <button class="filter-pill" data-category="work" aria-pressed="false" onclick="filterByCategory('work', this)">Work Permit</button>
          <button class="filter-pill" data-category="visa" aria-pressed="false" onclick="filterByCategory('visa', this)">Visa &amp; Immigration</button>
          <button class="filter-pill" data-category="job" aria-pressed="false" onclick="filterByCategory('job', this)">Part-time Jobs</button>
          <button class="filter-pill" data-category="housing" aria-pressed="false" onclick="filterByCategory('housing', this)">Housing</button>
          <button class="filter-pill" data-category="banking" aria-pressed="false" onclick="filterByCategory('banking', this)">Banking</button>
          <button class="filter-pill" data-category="emergency" aria-pressed="false" onclick="filterByCategory('emergency', this)">Emergency</button>
        </div>
        <div id="guidesContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5" data-aos="fade-up" data-aos-delay="100"></div>
        <p id="guidesCount" class="sr-only" aria-live="polite"></p>
        <aside class="ad-slot ad-slot--sidebar mt-10" data-ad-slot="sidebar" aria-hidden="true"></aside>
      </div>
    </section>

  </main>

  <div data-footer></div>
  <script>
    let allGuidePosts = [];
    let currentCategory = 'all';
    let currentQuery = '';
    window.addEventListener('guides:loaded', (e) => {
      allGuidePosts = e.detail;
      const urlParams = new URLSearchParams(window.location.search);
      const searchQ = urlParams.get('q');
      if (searchQ) {
        currentQuery = searchQ.toLowerCase().trim();
        const searchInput = document.getElementById('guidesSearch');
        if (searchInput) searchInput.value = searchQ;
      }
      applyFilters();
    });
    function escapeHtml(str) {
      return String(str == null ? '' : str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function filterByCategory(cat, btn) {
      currentCategory = cat;
      document.querySelectorAll('.filter-pill').forEach(p => {
        p.classList.remove('active');
        p.setAttribute('aria-pressed', 'false');
      });
      btn.classList.add('active');
      btn.setAttribute('aria-pressed', 'true');
      applyFilters();
    }

    function filterGuides() {
      currentQuery = document.getElementById('guidesSearch').value.toLowerCase().trim();
      applyFilters();
    }

    function applyFilters() {
      const container = document.getElementById('guidesContainer');
      const posts = allGuidePosts;
      if (!container || !posts.length) return;
      let filtered = posts;
      if (currentCategory !== 'all') {
        filtered = filtered.filter(p => {
          const cats = p.categories ? Object.values(p.categories).map(c => c.name.toLowerCase()) : [];
          return cats.some(c => c.includes(currentCategory));
        });
      }
      if (currentQuery) {
        filtered = filtered.filter(p => {
          const title = (p.title || '').toLowerCase();
          const content = (p.content || '').toLowerCase();
          return title.includes(currentQuery) || content.includes(currentQuery);
        });
      }
      renderGuides(filtered);
    }

    function renderGuides(posts) {
      const container = document.getElementById('guidesContainer');
      const count = document.getElementById('guidesCount');
      if (!posts.length) {
        container.innerHTML = '<p class="text-white/30 text-center col-span-full py-10 text-sm">No guides match your criteria.</p>';
        if (count) count.textContent = 'No guides match your criteria.';
        return;
      }
      if (count) count.textContent = posts.length + (posts.length === 1 ? ' guide shown.' : ' guides shown.');
      container.innerHTML = posts.map(post => {
        const title = escapeHtml(post.title || '');
        const desc = escapeHtml(post.desc || '');
        const pdfUrl = escapeHtml(post.pdfUrl || '');
        const url = escapeHtml(post.url || '');
        const date = escapeHtml(post.date || '');
        const catNames = post.categories ? Object.values(post.categories).map(c => escapeHtml(c.name || c)).join(', ') : '';
        const guideLink = 'guide.html?id=' + encodeURIComponent(post.id);
        return `
          <article class="group glass-card p-6 flex flex-col">
            <div class="flex items-center justify-between mb-4">
              ${pdfUrl ? '<span class="badge-new"><i class="fas fa-file-pdf text-[10px]" aria-hidden="true"></i> PDF</span>' : '<span class="badge-new"><i class="fas fa-book-open text-[10px]" aria-hidden="true"></i> Guide</span>'}
              <span class="text-xs text-white/40 font-medium">${date}</span>
            </div>
            <div class="w-11 h-11 rounded-xl bg-blue-500/10 flex items-center justify-center text-blue-300 text-sm mb-4 group-hover:scale-110 transition-transform">
              <i class="fas fa-file-alt" aria-hidden="true"></i>
            </div>
            <h3 class="text-sm font-bold text-white mb-2 line-clamp-2 leading-snug group-hover:text-blue-300 transition-colors">${title}</h3>
            ${catNames ? `<span class="text-[10px] text-white/40 font-medium mb-2">${catNames}</span>` : ''}
            <p class="text-white/50 text-xs leading-relaxed mb-5 line-clamp-3 flex-1">${desc}</p>
            <div class="flex gap-2 mt-auto">
              <a href="${guideLink}" class="flex-1 text-center btn-primary btn-sm">Read Guide</a>
              ${pdfUrl ? `<button class="flex-1 text-center btn-outline btn-sm" data-pdf-url="${pdfUrl}" data-pdf-title="${title}" data-action="download-pdf">Download</button>` : ''}
              ${url ? `<a href="${url}" target="_blank" rel="noopener" class="flex-1 text-center btn-ghost btn-sm" title="View on WordPress" aria-label="View on WordPress"><i class="fas fa-external-link-alt" aria-hidden="true"></i></a>` : ''}
            </div>
          </article>
        `;
      }).join('');
    }

    document.getElementById('guidesContainer').addEventListener('click', function(e) {
      var btn = e.target.closest('[data-action="download-pdf"]');
      if (!btn) return;
      var url = btn.getAttribute('data-pdf-url');
      var title = btn.getAttribute('data-pdf-title');
      window.downloadPdf(url, title);
    });
  </script>
  <script src="../js/main.js" type="module"></script>
</body>
</html>
