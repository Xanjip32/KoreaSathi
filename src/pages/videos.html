      transition: all 0.2s ease;

    .video-tab.active {

      border-color: rgba(59,130,246,0.3); box-shadow: 0 0 20px rgba(59,130,246,0.1);
    }
    .video-tab-count {

    .video-tab.active .video-tab-count { background: rgba(59,130,246,0.2); color: rgba(96,165,250,0.9); }
